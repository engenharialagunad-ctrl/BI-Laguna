<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #18212f;
      background: #eef3f0;
    }
    .shell { min-height: 100vh; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 24px;
      background: #10271d;
      color: #fff;
    }
    .brand { font-size: 24px; font-weight: 800; letter-spacing: 0; }
    .updated { font-size: 12px; color: #bdd3c7; }
    .content { padding: 18px 24px 28px; }
    .kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .kpi {
      background: #fff;
      border: 1px solid #dce5df;
      border-radius: 8px;
      padding: 14px;
      min-height: 92px;
    }
    .kpi span { display: block; color: #64756d; font-size: 11px; text-transform: uppercase; }
    .kpi strong { display: block; margin-top: 8px; font-size: 24px; color: #10271d; }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .panel {
      background: #fff;
      border: 1px solid #dce5df;
      border-radius: 8px;
      padding: 16px;
      min-width: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #10271d;
    }
    .bars { display: grid; gap: 10px; }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(120px, 210px) 1fr 70px;
      gap: 10px;
      align-items: center;
      font-size: 12px;
    }
    .track {
      height: 12px;
      overflow: hidden;
      background: #edf2ef;
      border-radius: 999px;
    }
    .fill {
      height: 100%;
      background: linear-gradient(90deg, #2e8f5a, #f0b84f);
      border-radius: 999px;
    }
    .donut-wrap {
      display: flex;
      gap: 18px;
      align-items: center;
      min-height: 220px;
    }
    .donut {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: conic-gradient(#2e8f5a 0deg, #2e8f5a 120deg, #f0b84f 120deg, #f0b84f 240deg, #4a6fa5 240deg);
      position: relative;
      flex: 0 0 auto;
    }
    .donut:after {
      content: "";
      position: absolute;
      inset: 42px;
      border-radius: 50%;
      background: #fff;
    }
    .legend { display: grid; gap: 8px; font-size: 12px; }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .swatch { width: 12px; height: 12px; border-radius: 3px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      padding: 8px;
      border-bottom: 1px solid #e2e8e4;
      text-align: left;
      white-space: nowrap;
    }
    th { color: #4b5f55; font-weight: 700; background: #f7faf8; }
    .status {
      margin: 20px;
      padding: 18px;
      background: #fff;
      border: 1px solid #dce5df;
      border-radius: 8px;
      color: #334155;
      white-space: pre-wrap;
    }
    @media (max-width: 960px) {
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 1fr; }
      th, td { white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="shell" id="app"></div>

  <script>
    var payload = <?!= payload ?>;

    function n(value) {
      return Number(value || 0);
    }

    function text(value) {
      return value !== undefined && value !== null && value !== "" ? value : "-";
    }

    function renderKpis(data) {
      var indicators = data.indicators || {};
      var cards = [
        ["Clientes", indicators.totalClients],
        ["Processos", indicators.totalProcesses],
        ["Cortes", indicators.totalCuts],
        ["Comprimento (mm)", indicators.totalLength],
        ["Barras", indicators.totalBars],
        ["Tempo (min)", indicators.totalTimeMinutes]
      ];
      return "<section class='kpis'>" + cards.map(function(card) {
        return "<div class='kpi'><span>" + card[0] + "</span><strong>" + text(card[1]) + "</strong></div>";
      }).join("") + "</section>";
    }

    function renderProcessBars(data) {
      var rows = (data.clientProcessSummary || []).slice().sort(function(a, b) {
        return n(b.timeMinutes) - n(a.timeMinutes);
      }).slice(0, 12);
      var max = rows.reduce(function(total, row) { return Math.max(total, n(row.timeMinutes)); }, 0);
      return "<div class='bars'>" + rows.map(function(row) {
        var width = max > 0 ? Math.max(3, Math.round((n(row.timeMinutes) / max) * 100)) : 0;
        return "<div class='bar-row'><div>" + text(row.client) + " | " + text(row.process) + "</div><div class='track'><div class='fill' style='width:" + width + "%'></div></div><strong>" + text(row.timeMinutes) + "</strong></div>";
      }).join("") + "</div>";
    }

    function renderCutDonut(data) {
      var counts = data.cutTypeCounts || {};
      var keys = Object.keys(counts);
      var total = keys.reduce(function(sum, key) { return sum + n(counts[key]); }, 0);
      var colors = ["#2e8f5a", "#f0b84f", "#4a6fa5"];
      var start = 0;
      var segments = keys.map(function(key, index) {
        var degrees = total > 0 ? (n(counts[key]) / total) * 360 : 0;
        var segment = colors[index % colors.length] + " " + start + "deg " + (start + degrees) + "deg";
        start += degrees;
        return segment;
      });
      var legend = keys.map(function(key, index) {
        return "<div class='legend-item'><span class='swatch' style='background:" + colors[index % colors.length] + "'></span><span>" + key + ": <strong>" + counts[key] + "</strong></span></div>";
      }).join("");
      return "<div class='donut-wrap'><div class='donut' style='background:conic-gradient(" + segments.join(",") + ")'></div><div class='legend'>" + legend + "</div></div>";
    }

    function renderClientTable(data) {
      var rows = data.clientSummary || [];
      return "<table><thead><tr><th>Cliente</th><th>Processos</th><th>Cortes</th><th>Barras</th><th>Tempo (min)</th></tr></thead><tbody>" +
        rows.map(function(row) {
          return "<tr><td>" + text(row.client) + "</td><td>" + text(row.processes) + "</td><td>" + text(row.totalCuts) + "</td><td>" + text(row.totalBars) + "</td><td>" + text(row.totalTimeMinutes) + "</td></tr>";
        }).join("") + "</tbody></table>";
    }

    function renderProcessTable(data) {
      var rows = data.clientProcessSummary || [];
      return "<table><thead><tr><th>Cliente</th><th>Processo</th><th>Cortes</th><th>Comprimento</th><th>Barras</th><th>Tempo</th></tr></thead><tbody>" +
        rows.map(function(row) {
          return "<tr><td>" + text(row.client) + "</td><td>" + text(row.process) + "</td><td>" + text(row.totalCuts) + "</td><td>" + text(row.totalLength) + "</td><td>" + text(row.totalBars) + "</td><td>" + text(row.timeMinutes) + "</td></tr>";
        }).join("") + "</tbody></table>";
    }

    function render() {
      var app = document.getElementById("app");
      if (!payload.ok) {
        app.innerHTML = "<div class='status'>Nao foi possivel carregar o BI Laguna.\n\n" + text(payload.diagnostic) + "</div>";
        return;
      }

      var data = payload.data || {};
      app.innerHTML =
        "<header class='topbar'><div><div class='brand'>BI Laguna</div><div class='updated'>Atualizado em " + text(payload.generatedAt) + "</div></div><div class='updated'>" + text(payload.spreadsheet && payload.spreadsheet.name) + "</div></header>" +
        "<main class='content'>" +
          renderKpis(data) +
          "<section class='grid'><div class='panel'><h2>Tempo por Cliente e Processo</h2>" + renderProcessBars(data) + "</div><div class='panel'><h2>Tipos de Corte</h2>" + renderCutDonut(data) + "</div></section>" +
          "<section class='grid'><div class='panel'><h2>Resumo por Cliente</h2>" + renderClientTable(data) + "</div><div class='panel'><h2>Processos</h2>" + renderProcessTable(data) + "</div></section>" +
        "</main>";
    }

    render();
  </script>
</body>
</html>
